name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - name: Build binaries
        run: |
          mkdir -p dist
          for goos in linux darwin windows; do
            for goarch in amd64 arm64; do
              if [ "$goos/$goarch" = "windows/arm64" ]; then continue; fi
              if [ "$goos" = "windows" ]; then
                CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build -trimpath -ldflags="-s -w" -o dist/jot-$goos-$goarch.exe ./cmd/jot
              else
                CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build -trimpath -ldflags="-s -w" -o dist/jot-$goos-$goarch ./cmd/jot
                CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build -trimpath -ldflags="-s -w" -o dist/jot-server-$goos-$goarch ./cmd/jot-server
              fi
            done
          done
          cd dist && sha256sum * > checksums.txt
      - uses: sigstore/cosign-installer@v4
      - name: Sign checksums
        run: cosign sign-blob --yes --output-signature dist/checksums.txt.sig dist/checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
