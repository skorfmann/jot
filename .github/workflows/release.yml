name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - name: Build binaries
        run: |
          mkdir -p dist
          for goos in linux darwin windows; do
            for goarch in amd64 arm64; do
              if [ "$goos/$goarch" = "windows/arm64" ]; then continue; fi
              if [ "$goos" = "windows" ]; then
                CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build -trimpath -ldflags="-s -w" -o dist/jot-$goos-$goarch.exe ./cmd/jot
              else
                CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build -trimpath -ldflags="-s -w" -o dist/jot-$goos-$goarch ./cmd/jot
                CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build -trimpath -ldflags="-s -w" -o dist/jot-server-$goos-$goarch ./cmd/jot-server
              fi
            done
          done
          cd dist && sha256sum * > checksums.txt
      - uses: sigstore/cosign-installer@v4.1.2
      - name: Sign checksums
        run: cosign sign-blob --yes --bundle dist/checksums.txt.bundle dist/checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
      - name: Publish Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to publish skorfmann/homebrew-jot" >&2
            exit 1
          fi
          trap 'rm -rf tap' EXIT

          version="${GITHUB_REF_NAME#v}"
          checksum() {
            local name="$1"
            local sum
            sum="$(awk -v name="$name" '$2 == name { print $1 }' dist/checksums.txt)"
            if [ -z "$sum" ]; then
              echo "missing checksum for $name" >&2
              exit 1
            fi
            printf '%s' "$sum"
          }

          auth="$(printf 'x-access-token:%s' "$HOMEBREW_TAP_TOKEN" | base64 | tr -d '\n')"
          auth_header="AUTHORIZATION: basic ${auth}"
          tap_branch="main"
          git -c "http.https://github.com/.extraheader=${auth_header}" \
            clone --depth 1 --branch "$tap_branch" https://github.com/skorfmann/homebrew-jot.git tap

          cat > tap/Formula/jot.rb <<EOF
          class Jot < Formula
            desc "CLI for the Jot private static-hosting service"
            homepage "https://github.com/skorfmann/jot"
            version "${version}"

            on_macos do
              on_arm do
                url "https://github.com/skorfmann/jot/releases/download/v#{version}/jot-darwin-arm64"
                sha256 "$(checksum jot-darwin-arm64)"
              end

              on_intel do
                url "https://github.com/skorfmann/jot/releases/download/v#{version}/jot-darwin-amd64"
                sha256 "$(checksum jot-darwin-amd64)"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/skorfmann/jot/releases/download/v#{version}/jot-linux-arm64"
                sha256 "$(checksum jot-linux-arm64)"
              end

              on_intel do
                url "https://github.com/skorfmann/jot/releases/download/v#{version}/jot-linux-amd64"
                sha256 "$(checksum jot-linux-amd64)"
              end
            end

            def install
              bin.install Dir["jot-*"].first => "jot"
            end

            def caveats
              <<~EOS
                This formula installs \`jot\`, which on macOS shadows the BSD \`jot\`
                utility (a number-sequence generator). To use the BSD jot, invoke it as
                /usr/bin/jot.
              EOS
            end

            test do
              output = shell_output("#{bin}/jot --help")
              assert_match "Push private static artifacts", output
              assert_match "Examples:", output
            end
          end
          EOF
          cat > tap/Formula/jot-server.rb <<EOF
          class JotServer < Formula
            desc "Server for the Jot private static-hosting service"
            homepage "https://github.com/skorfmann/jot"
            version "${version}"

            on_macos do
              on_arm do
                url "https://github.com/skorfmann/jot/releases/download/v#{version}/jot-server-darwin-arm64"
                sha256 "$(checksum jot-server-darwin-arm64)"
              end

              on_intel do
                url "https://github.com/skorfmann/jot/releases/download/v#{version}/jot-server-darwin-amd64"
                sha256 "$(checksum jot-server-darwin-amd64)"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/skorfmann/jot/releases/download/v#{version}/jot-server-linux-arm64"
                sha256 "$(checksum jot-server-linux-arm64)"
              end

              on_intel do
                url "https://github.com/skorfmann/jot/releases/download/v#{version}/jot-server-linux-amd64"
                sha256 "$(checksum jot-server-linux-amd64)"
              end
            end

            def install
              bin.install Dir["jot-server-*"].first => "jot-server"
            end

            test do
              assert_match "config", shell_output("#{bin}/jot-server --help 2>&1")
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/jot.rb Formula/jot-server.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap is already current for ${GITHUB_REF_NAME}"
            exit 0
          fi
          git commit -m "Update jot to ${GITHUB_REF_NAME}"
          git -c "http.https://github.com/.extraheader=${auth_header}" \
            push origin "HEAD:${tap_branch}"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
